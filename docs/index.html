<!doctype html><html><head><meta charset="utf-8"><title>Contractiontimer - Labor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#1A0D0D; color:#f5f5f5; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 80px 24px; text-align:center; }
    h1 { color:#E85D5D; font-size: 2.2rem; margin-bottom: 0.5rem; }
    p { line-height:1.6; color:#d8d8d8; }
    a { color:#E85D5D; }
    .badge { display:inline-block; padding:8px 18px; border:1px solid #E85D5D; border-radius:999px; color:#E85D5D; margin-top:24px; font-size:0.9rem; }
    footer { margin-top:60px; font-size:0.8rem; color:#888; }
    
  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #E85D5D55 0%, #E85D5D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1>Contractiontimer - Labor</h1>
<p>Time contractions and their frequency so you know when to head to the hospital.</p>
<div class="badge">Available on the App Store</div>

</div></body></html>
